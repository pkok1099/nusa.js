<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NUSANTARA: Warisan Terakhir</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;margin:auto;image-rendering:pixelated}
#gameContainer{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
#loading{position:absolute;color:#D4AF37;font-size:18px;text-align:center;top:50%;left:50%;transform:translate(-50%,-50%)}
#loading .sub{font-size:12px;color:#D4AF3788;margin-top:8px}
#loadError{display:none;position:absolute;color:#FF6666;font-size:14px;text-align:center;top:60%;left:50%;transform:translate(-50%,-50%);max-width:500px}
#loadError a{color:#D4AF37}
</style>
</head>
<body>
<div id="gameContainer">
<canvas id="gameCanvas"></canvas>
<div id="loading">MEMUAT NUSANTARA...<div class="sub">Harap tunggu sebentar</div></div>
<div id="loadError">Gagal memuat modul game.<br>Pastikan file dijalankan via HTTP server (bukan file://).<br>Coba: <code>npx serve .</code> atau <code>python3 -m http.server</code><br><a href="https://github.com/pkok1099/nusa.js" target="_blank">GitHub Repo</a></div>
</div>

<!-- ES Module Entry Point — browser native, no build tool needed -->
<script type="module" src="js/game.js"></script>

<!-- Touch controls module — initializes on mobile devices -->
<script type="module">
  import { initTouchControls } from './js/touch.js';
  initTouchControls();
</script>

<!-- Fallback: if module fails to load (e.g. file:// protocol), show error -->
<script>
window.addEventListener('error', function(e) {
  if (e.target && e.target.tagName === 'SCRIPT') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('loadError').style.display = 'block';
  }
}, true);
</script>
</body>
</html>
